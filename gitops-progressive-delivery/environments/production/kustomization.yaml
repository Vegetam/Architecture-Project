apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: microservices

resources:
  - ../base

commonLabels:
  environment: production

# Image tags pinned to specific SHAs in production — never use "latest"
# Updated by CI after staging validation passes.
images:
  - name: ghcr.io/vegetam/order-service
    newTag: "REPLACE_WITH_SHA"
  - name: ghcr.io/vegetam/payment-service
    newTag: "REPLACE_WITH_SHA"
  - name: ghcr.io/vegetam/saga-orchestrator
    newTag: "REPLACE_WITH_SHA"

patches:
  # Production replicas — scale up from base
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 4
    target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: order-service

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: payment-service

  # Production resource limits
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
    target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout

  # Production HPA — higher ceiling
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 20
    target:
      group: autoscaling
      version: v2
      kind: HorizontalPodAutoscaler

  # Production PDB — at least 2 pods always available
  - patch: |-
      - op: replace
        path: /spec/minAvailable
        value: 2
    target:
      version: v1
      kind: PodDisruptionBudget

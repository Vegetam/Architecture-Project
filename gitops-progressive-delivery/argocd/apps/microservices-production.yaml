apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microservices-production
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    notifications.argoproj.io/subscribe.on-deployed.slack: deployments
    notifications.argoproj.io/subscribe.on-sync-failed.slack: alerts
    notifications.argoproj.io/subscribe.on-health-degraded.pagerduty: oncall
spec:
  project: microservices

  source:
    repoURL: https://github.com/Vegetam/gitops-progressive-delivery
    targetRevision: HEAD
    path: environments/production

  destination:
    server: https://kubernetes.default.svc
    namespace: microservices

  syncPolicy:
    # Production: NO automated sync — a human must approve every deploy.
    # Trigger via: argocd app sync microservices-production
    automated: null
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 2
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m

  ignoreDifferences:
    - group: argoproj.io
      kind: Rollout
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas

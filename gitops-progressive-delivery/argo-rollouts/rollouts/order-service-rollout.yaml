# ==============================================================================
# Rollout: order-service  (Canary strategy)
#
# Traffic progression:
#   5% → [analysis] → 25% → [analysis] → 50% → [analysis] → 100%
#
# Analysis uses Prometheus metrics from observability-platform-turnkey-fixed.
# An unhealthy canary is automatically rolled back; no human intervention needed.
# ==============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: order-service
  namespace: microservices
  labels:
    app: order-service
    team: platform
spec:
  replicas: 4
  revisionHistoryLimit: 3

  selector:
    matchLabels:
      app: order-service

  template:
    metadata:
      labels:
        app: order-service
        version: "{{.Values.image.tag}}"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: order-service
          image: ghcr.io/vegetam/order-service:latest
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4318
            - name: OTEL_SERVICE_NAME
              value: order-service
          resources:
            limits:
              memory: 256Mi
              cpu: "500m"
            requests:
              memory: 128Mi
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10

  strategy:
    canary:
      # Stable pods serve the old version; canary pods serve the new version.
      # Traffic split is weighted at the ingress/service level.
      canaryService: order-service-canary
      stableService: order-service-stable

      trafficRouting:
        nginx:
          stableIngress: order-service-ingress

      steps:
        - setWeight: 5
        - pause: {duration: 2m}    # Warm-up: let real traffic hit canary

        - analysis:
            templates:
              - templateName: success-rate
              - templateName: latency-p99
            args:
              - name: service-name
                value: order-service

        - setWeight: 25
        - pause: {duration: 3m}

        - analysis:
            templates:
              - templateName: success-rate
              - templateName: latency-p99
            args:
              - name: service-name
                value: order-service

        - setWeight: 50
        - pause: {duration: 5m}

        - analysis:
            templates:
              - templateName: success-rate
              - templateName: latency-p99
            args:
              - name: service-name
                value: order-service

        # 100% — Argo Rollouts promotes automatically if all analyses passed

      autoPromotionEnabled: true
      autoPromotionSeconds: 30   # Promote 30s after last step succeeds

      # Rollback on analysis failure: return to previous stable version
      abortScaleDownDelaySeconds: 30

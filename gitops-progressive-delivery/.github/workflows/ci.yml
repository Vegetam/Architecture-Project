name: CI

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "helm-charts/**"
      - "environments/**"
      - "argo-rollouts/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/**"
      - "helm-charts/**"
      - "environments/**"
      - "argo-rollouts/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  service-smoke-test:
    name: Service Smoke Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [order-service, payment-service, saga-orchestrator]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: services/${{ matrix.service }}
      - name: Static syntax check
        run: node --check server.js
        working-directory: services/${{ matrix.service }}
      - name: Health endpoint smoke test
        run: |
          node server.js &
          PID=$!
          trap 'kill $PID' EXIT
          sleep 2
          curl -fsS http://127.0.0.1:8080/health/ready > /dev/null
        working-directory: services/${{ matrix.service }}

  build-and-scan:
    name: Build and Scan Images
    runs-on: ubuntu-latest
    needs: service-smoke-test
    strategy:
      matrix:
        service: [order-service, payment-service, saga-orchestrator]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Set image tag
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Extract OCI metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=${{ matrix.service }}
            org.opencontainers.image.description=Sample service used by gitops-progressive-delivery
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
      - name: Build image locally for scanning
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: false
          load: true
          tags: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ steps.vars.outputs.short_sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy security scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ steps.vars.outputs.short_sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif

  publish-images:
    name: Publish Images
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        service: [order-service, payment-service, saga-orchestrator]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract OCI metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=${{ matrix.service }}
            org.opencontainers.image.description=Sample service used by gitops-progressive-delivery
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
      - name: Push image
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-staging:
    name: Update Staging Image Tags
    runs-on: ubuntu-latest
    needs: publish-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_TOKEN }}
      - name: Set image tag
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Install Kustomize
        run: |
          curl -sL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
      - name: Update staging image tags
        run: |
          cd environments/staging
          kustomize edit set image \
            ghcr.io/${{ github.repository_owner }}/order-service=ghcr.io/${{ github.repository_owner }}/order-service:${{ steps.vars.outputs.short_sha }} \
            ghcr.io/${{ github.repository_owner }}/payment-service=ghcr.io/${{ github.repository_owner }}/payment-service:${{ steps.vars.outputs.short_sha }} \
            ghcr.io/${{ github.repository_owner }}/saga-orchestrator=ghcr.io/${{ github.repository_owner }}/saga-orchestrator:${{ steps.vars.outputs.short_sha }}
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add environments/staging/kustomization.yaml
          git commit -m "chore(staging): update images to ${{ steps.vars.outputs.short_sha }}" || exit 0
          git push

  promote-production:
    name: Promote to Production
    runs-on: ubuntu-latest
    needs: update-staging
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_TOKEN }}
          ref: main
          fetch-depth: 0
      - name: Set image tag
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Install Kustomize
        run: |
          curl -sL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
      - name: Pin production to exact SHA
        run: |
          cd environments/production
          kustomize edit set image \
            ghcr.io/${{ github.repository_owner }}/order-service=ghcr.io/${{ github.repository_owner }}/order-service:${{ steps.vars.outputs.short_sha }} \
            ghcr.io/${{ github.repository_owner }}/payment-service=ghcr.io/${{ github.repository_owner }}/payment-service:${{ steps.vars.outputs.short_sha }} \
            ghcr.io/${{ github.repository_owner }}/saga-orchestrator=ghcr.io/${{ github.repository_owner }}/saga-orchestrator:${{ steps.vars.outputs.short_sha }}
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add environments/production/kustomization.yaml
          git commit -m "chore(production): promote ${{ steps.vars.outputs.short_sha }}" || exit 0
          git push

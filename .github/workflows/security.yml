name: Security

on:
  pull_request:
    paths:
      - "observability-platform-turnkey/**"
      - ".github/workflows/security.yml"
  push:
    branches: [main]
    paths:
      - "observability-platform-turnkey/**"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "0 6 * * 1"  # weekly on Monday

jobs:
  trivy-fs:
    name: Trivy (filesystem scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: ./observability-platform-turnkey
          ignore-unfixed: true
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: observability-platform-turnkey
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: python -m pip install --upgrade pip yamllint
      - name: Lint YAML
        run: |
          yamllint -d '{extends: default, rules: {line-length: {max: 140}}}' .

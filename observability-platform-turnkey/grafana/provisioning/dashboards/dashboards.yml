apiVersion: 1

providers:
  - name: observability-platform
    orgId: 1
    folder: "Observability Platform"
    folderUid: obs-platform
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true

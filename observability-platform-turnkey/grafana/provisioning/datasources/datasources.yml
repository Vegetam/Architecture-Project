apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: tempo
          urlDisplayLabel: "View trace"

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    uid: tempo
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-1m"
        spanEndTimeShift: "1m"
        filterByTraceID: true
        filterBySpanID: false
        customQuery: false
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: "-1m"
        spanEndTimeShift: "1m"
        queries:
          - name: Request rate
            query: "sum(rate(calls_total{$$__tags}[5m]))"
          - name: Error rate
            query: "sum(rate(calls_total{$$__tags, status_code=\"STATUS_CODE_ERROR\"}[5m]))"
      nodeGraph:
        enabled: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki
    editable: false
    jsonData:
      derivedFields:
        - name: TraceID
          matcherRegex: '(?:"trace_id"|"traceId"|trace_id|traceId)[:=]"?([0-9a-f]{32})"?'
          url: '$${__value.raw}'
          datasourceUid: tempo
          urlDisplayLabel: "View trace"
        - name: CorrelationID
          matcherRegex: '(?:"correlation_id"|"correlationId"|correlation_id|correlationId)[:=]"?([\w-]+)"?'
          url: ''

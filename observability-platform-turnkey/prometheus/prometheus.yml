# ==============================================================================
# Prometheus — production-minded scrape configuration
#
# Notes:
# - microservices are discovered via file_sd (prometheus/targets/*.json)
# - in Kubernetes, replace file_sd with native Kubernetes service discovery.
# ==============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  # environment is read from the ENVIRONMENT env var (set in .env / docker-compose).
  # Prometheus expands ${VAR} when started with --config.expand-env=true.
  # Default is "local" to avoid tagging dev data as production.
  external_labels:
    environment: ${ENVIRONMENT:-local}
    platform: observability-platform

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:

  # OTel Collector metrics exporter (includes spanmetrics)
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  # OTel Collector self-metrics
  - job_name: otel-collector-self
    static_configs:
      - targets: ["otel-collector:8888"]

  # Kong Gateway (Prometheus plugin via Admin API)
  - job_name: kong
    static_configs:
      - targets: ["kong:8001"]
    metrics_path: /metrics

  # Loki
  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
    metrics_path: /metrics

  # Tempo
  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]
    metrics_path: /metrics

  # Alertmanager
  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

  # Microservices / external targets (file_sd)
  - job_name: microservices
    honor_labels: true
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/*.json
        refresh_interval: 30s

  # Prometheus self-scrape
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

# Loki HA values
# This assumes you provide S3 credentials/config via a Secret named "loki-s3".

loki:
  auth_enabled: false

# Chart schemas vary. The production requirement is:
# - object storage backend (S3/GCS/Azure)
# - replication_factor > 1
# - compactor enabled + retention configured
# Use `helm show values grafana/loki` for the exact schema.

envFrom:
  - secretRef:
      name: loki-s3

# Example knobs (adjust to your chart version)
compactor:
  enabled: true

# Example "simple scalable" style replica counts (if supported by your chart)
read:
  replicas: 2
write:
  replicas: 3
backend:
  replicas: 3

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 2
    memory: 2Gi

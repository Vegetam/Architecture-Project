# Loki storage overlay: MinIO (dev/local)
# NOTE: Use this with the HA/base values. This config is intended for development clusters.
loki:
  storage:
    type: s3
    s3:
      endpoint: http://minio.observability.svc.cluster.local:9000
      region: us-east-1
      accessKeyId: ${MINIO_ACCESS_KEY}
      secretAccessKey: ${MINIO_SECRET_KEY}
      s3ForcePathStyle: true
      insecure: true
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
      admin: loki-admin

# AWS overlay (IRSA / no static keys)
# Requires: AWS_IRSA_ROLE_ARN (IAM role for service account)
configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: ${VELERO_BUCKET}
      config:
        region: ${AWS_REGION}
initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.9.2
    volumeMounts:
      - mountPath: /target
        name: plugins
serviceAccount:
  server:
    annotations:
      eks.amazonaws.com/role-arn: ${AWS_IRSA_ROLE_ARN}

# AKS cloud profile for Tempo distributed
# Uses managed-premium-backed PVCs for stateful parts and spreads critical components by zone.

ingester:
  persistence:
    enabled: true
    storageClass: managed-premium
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: ingester
  podDisruptionBudget:
    maxUnavailable: 1

compactor:
  persistence:
    enabled: true
    storageClass: managed-premium

distributor:
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: distributor
  podDisruptionBudget:
    maxUnavailable: 1

querier:
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: querier
  podDisruptionBudget:
    maxUnavailable: 1

queryFrontend:
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: query-frontend

# GKE cloud profile for Grafana
# Enables persistent storage on premium-rwo and spreads replicas by zone when scaling above one replica.

persistence:
  enabled: true
  type: pvc
  storageClassName: premium-rwo
  size: 10Gi

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: grafana

# Opinionated defaults (cloud profile)
replicas: 2

podDisruptionBudget:
  minAvailable: 1

ingress:
  ingressClassName: gce
  annotations:
    kubernetes.io/ingress.class: gce

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: topology.kubernetes.io/zone
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: grafana


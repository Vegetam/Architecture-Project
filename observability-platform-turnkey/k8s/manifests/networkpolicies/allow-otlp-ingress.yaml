apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-otlp-ingress
  namespace: observability
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-collector
  policyTypes:
    - Ingress
  ingress:
    - from:
        # Allow namespaces that opt-in to sending telemetry.
        - namespaceSelector:
            matchLabels:
              observability-client: "true"
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318

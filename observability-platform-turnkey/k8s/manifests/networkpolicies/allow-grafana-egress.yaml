apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana-egress
  namespace: observability
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: observability
      ports:
        - protocol: TCP
          port: 9090 # Prometheus
        - protocol: TCP
          port: 80   # Loki gateway (example)
        - protocol: TCP
          port: 3100 # Loki (direct)
        - protocol: TCP
          port: 3200 # Tempo (example)

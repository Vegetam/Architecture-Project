apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: meta-monitoring
  namespace: observability
spec:
  groups:
    - name: meta-monitoring
      rules:
        - alert: PrometheusTargetsMissing
          expr: sum(up) < 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Prometheus appears to be scraping nothing"
            description: >-
              The number of scrape targets up is < 1 for 5 minutes.
              This usually means SD is broken or Prometheus cannot reach targets.

        - alert: HighScrapeErrorRate
          expr: rate(prometheus_target_scrapes_exceeded_sample_limit_total[5m]) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Prometheus scrape sample limit exceeded"
            description: "Prometheus is hitting scrape sample limits. Consider reducing cardinality or raising limits."

        - alert: HighContainerRestarts
          expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Container restarting frequently"
            description: "A container restarted more than 3 times in the last 15 minutes."

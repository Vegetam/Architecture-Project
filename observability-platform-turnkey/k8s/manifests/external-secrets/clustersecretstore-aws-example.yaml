# Example ClusterSecretStore for AWS Secrets Manager.
# Requires External Secrets Operator (ESO) installed and IAM permissions configured.
# Do not apply as-is.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: your-secret-store
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets

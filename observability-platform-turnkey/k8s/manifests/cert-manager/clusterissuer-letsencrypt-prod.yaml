# Render this manifest through k8s/scripts/apply-security.sh.
# Required environment variables:
# - LETSENCRYPT_EMAIL
# Optional overrides:
# - INGRESS_CLASS_NAME (default: nginx)
# - LETSENCRYPT_SERVER (default: production ACME endpoint)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: ${LETSENCRYPT_EMAIL}
    server: ${LETSENCRYPT_SERVER}
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: ${INGRESS_CLASS_NAME}
